# === Database Configuration ===
#
# Development/Test: SQLite (fast, no setup required)
# Production: Supabase PostgreSQL (managed cloud DB)
# Solid Cache/Queue/Cable: Local SQLite in all environments
#
# 프로덕션 환경변수:
#   SUPABASE_DB_HOST     — aws-1-ap-southeast-2.pooler.supabase.com (session pooler, IPv4)
#   SUPABASE_DB_USER     — postgres.[project-ref]
#   SUPABASE_DB_PASSWORD — Supabase 프로젝트 DB 비밀번호
#   SUPABASE_DB_PORT     — 5432 (session pooler)

# === SQLite (Development / Test / Solid adapters) ===
sqlite: &sqlite
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  primary:
    <<: *sqlite
    database: storage/development.sqlite3

test:
  primary:
    <<: *sqlite
    database: storage/test.sqlite3

production:
  primary:
    adapter: postgresql
    encoding: unicode
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
    host: <%= ENV.fetch("SUPABASE_DB_HOST", "aws-1-ap-southeast-2.pooler.supabase.com") %>
    port: <%= ENV.fetch("SUPABASE_DB_PORT", 5432) %>
    database: postgres
    username: <%= ENV.fetch("SUPABASE_DB_USER", "postgres.tqcmbdphezkdyqvjpkvy") %>
    password: <%= ENV["SUPABASE_DB_PASSWORD"] %>
    prepared_statements: false
    sslmode: require
  cache:
    <<: *sqlite
    database: storage/production_cache.sqlite3
    migrations_paths: db/cache_migrate
  queue:
    <<: *sqlite
    database: storage/production_queue.sqlite3
    migrations_paths: db/queue_migrate
  cable:
    <<: *sqlite
    database: storage/production_cable.sqlite3
    migrations_paths: db/cable_migrate
